services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mednote
      POSTGRES_PASSWORD: mednote
      POSTGRES_DB: mednote_test
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mednote -d mednote_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      NODE_ENV: test
      DATABASE_URL: postgresql://mednote:mednote@db:5432/mednote_test
      JWT_SECRET: test_secret_long_random_value
      JWT_EXPIRES_IN: 7d
      AI_API_URL: https://api.example.com/v1/generate
      AI_API_KEY: test_key
      AI_MODEL: test-model
      CORS_ORIGIN: "*"
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX: 30
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma generate && npx prisma migrate deploy && npm test"
